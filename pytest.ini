# pytest.ini (в корне проекта, НЕ в папке llm)
[pytest]
# Путь к тестам (относительно корня)
testpaths = llm/tests

# Добавляем корень проекта в PYTHONPATH
pythonpath = .

# Шаблоны тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=llm
    --cov-report=html
    --cov-report=term
    --cov-report=xml
    --cov-branch

# Исключения из покрытия
[coverage:run]
source = llm
omit = 
    llm/tests/*
    llm/__pycache__/*
    */test_*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    pass